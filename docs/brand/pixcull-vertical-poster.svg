<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280"
     width="720" height="1280" role="img"
     aria-label="PixCull — 本地 AI 帮你 6 秒挑出一晚要拍的全部精选。">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6E56CF"/><stop offset="55%" stop-color="#A855F7"/><stop offset="100%" stop-color="#EC4899"/></linearGradient>
    <radialGradient id="cosmicBg" cx="30%" cy="35%" r="80%"><stop offset="0%"  stop-color="#3d1b69"/><stop offset="55%" stop-color="#1a1230"/><stop offset="100%" stop-color="#0b0d10"/></radialGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#cosmicBg)"/>
  <!-- Big centred glow behind the logo -->
  <ellipse cx="360" cy="500" rx="320" ry="320"
           fill="url(#brandGrad)" opacity="0.20"/>
  <!-- Logo centred upper third -->
  
<g transform="translate(144.00,284.00) scale(18)">
  <!-- the crowd: 4 small muted circles -->
  <circle cx="4"  cy="5"  r="1.6" fill="#ffffff" opacity="0.32"/>
  <circle cx="20" cy="6"  r="1.4" fill="#ffffff" opacity="0.28"/>
  <circle cx="3"  cy="19" r="1.8" fill="#ffffff" opacity="0.30"/>
  <circle cx="21" cy="20" r="1.3" fill="#ffffff" opacity="0.28"/>
  <!-- the picked one — large gradient + soft outer ring -->
  <circle cx="12" cy="12" r="7"  fill="url(#brandGrad)"/>
  <circle cx="12" cy="12" r="7.5" fill="none"
          stroke="url(#brandGrad)" stroke-width="0.6" opacity="0.5"/>
</g>
  <!-- Wordmark centred lower third (giant) -->
  <text x="360" y="940" font-family=""Charter","Iowan Old Style","PT Serif","Source Serif Pro","Cambria",Georgia,"Songti SC","STZhongsong",serif"
        font-size="120" font-weight="700" text-anchor="middle"
        letter-spacing="-2" fill="#ffffff">
    Pix<tspan fill="url(#brandGrad)">Cull</tspan>
  </text>
  <text x="360" y="990" font-family="-apple-system,"Inter","Segoe UI Variable","Segoe UI","PingFang SC","Microsoft Yahei UI",system-ui,sans-serif"
        font-size="20" font-weight="600" text-anchor="middle"
        letter-spacing="4" fill="#aab3c1">
    LOCAL-FIRST AI PHOTO CULLING
  </text>
  <!-- Tagline near bottom, broken if Chinese is long -->
  <text x="360" y="1130" font-family="-apple-system,"Inter","Segoe UI Variable","Segoe UI","PingFang SC","Microsoft Yahei UI",system-ui,sans-serif"
        font-size="28" font-weight="500" text-anchor="middle"
        fill="#dbdfe7" opacity="0.92">
    本地 AI 帮你 6 秒挑出一晚要拍的全部精选。
  </text>
  <text x="360" y="1220" font-family="-apple-system,"Inter","Segoe UI Variable","Segoe UI","PingFang SC","Microsoft Yahei UI",system-ui,sans-serif"
        font-size="13" font-weight="500" text-anchor="middle"
        fill="#7b8597" letter-spacing="2">
    github.com/ChrisChen667788/pixcull
  </text>
</svg>
