# v2.22-P1 — the release rail.
#
# Before this workflow existed, every version since v0.7.0 shipped with
# no git tag, no GitHub Release, and no artifact (2030Q3 audit): the
# README release badge was permanently stale and `pip install pixcull`
# had nothing to point at.  This closes the rail with ZERO external
# secrets — the built-in GITHUB_TOKEN is enough for `gh release create`.
#
# Usage (owner):
#   git tag v2.22.0 && git push origin v2.22.0
# → wheel is built from the tagged tree and attached to a GitHub
#   Release with auto-generated notes.  Idempotent: re-running on an
#   existing release just re-uploads the wheel (--clobber).
#
# PyPI publish stays a manual owner step (twine upload) until a
# PYPI_API_TOKEN secret is configured — this workflow never needs it.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # gh release create needs to write releases

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'ChrisChen667788/pixcull'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build wheel + sdist
        run: |
          pip install --upgrade pip build twine
          python -m build --outdir dist_wheel
          twine check dist_wheel/*

      - name: Smoke-test the wheel in a clean venv
        run: |
          python -m venv /tmp/wheel_smoke
          /tmp/wheel_smoke/bin/pip install --quiet dist_wheel/*.whl
          /tmp/wheel_smoke/bin/python -c "import pixcull; print('pixcull', pixcull.__version__)"

      - name: Create GitHub Release + attach wheel & sdist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag exists — re-uploading artifacts"
            gh release upload "$tag" dist_wheel/*.whl dist_wheel/*.tar.gz --clobber
          else
            gh release create "$tag" dist_wheel/*.whl dist_wheel/*.tar.gz \
              --title "PixCull $tag" \
              --generate-notes
          fi

      # v2.23-P0 — publish to PyPI so `pip install pixcull` works. Gated
      # on the PYPI_API_TOKEN secret: until the owner adds it (Settings →
      # Secrets → Actions, value = a pypi.org API token), this step is a
      # clean skip — it never fails the release. Once the secret exists,
      # every v* tag ships to PyPI automatically.
      - name: Publish to PyPI (if token configured)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::warning::PYPI_API_TOKEN not set — skipping PyPI publish (add the secret to enable pip install pixcull)"
            exit 0
          fi
          twine upload --non-interactive dist_wheel/*.whl dist_wheel/*.tar.gz
