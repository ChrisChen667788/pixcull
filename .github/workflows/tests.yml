name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the runner image manageable; PixCull
          # only needs torch for the rescorer head, not for training,
          # so CPU wheels are fine in CI.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Show resolved versions
        run: |
          python --version
          pip list | head -40

      - name: Run unit tests
        run: |
          # ``test_v1_1_scripts.py`` exercises CLI scripts whose
          # fixtures are not in the public repo; skip in CI.
          pytest -q --ignore=tests/test_v1_1_scripts.py
