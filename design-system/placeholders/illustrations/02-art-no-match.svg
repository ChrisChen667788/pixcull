<?xml version="1.0" encoding="UTF-8"?>
<!--
  v0.10 AI DRAFT · Illustration 02 — art-no-match
  Magnifier over an empty contact-sheet row.
  Surface: current filters cleared every photo from the batch.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="brandGrad-02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6E56CF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <ellipse cx="80" cy="103" rx="50" ry="5" fill="rgba(99,102,241,0.10)"/>

  <!-- contact sheet — 5 empty cells in a row -->
  <g stroke="#7a8696" stroke-width="1.4" opacity="0.6">
    <rect x="14"  y="44" width="22" height="26" rx="2" fill="rgba(167,182,193,0.04)"/>
    <rect x="40"  y="44" width="22" height="26" rx="2" fill="rgba(167,182,193,0.04)"/>
    <rect x="66"  y="44" width="22" height="26" rx="2" fill="rgba(167,182,193,0.04)"/>
    <rect x="92"  y="44" width="22" height="26" rx="2" fill="rgba(167,182,193,0.04)"/>
    <rect x="118" y="44" width="22" height="26" rx="2" fill="rgba(167,182,193,0.04)"/>
  </g>

  <!-- diagonal "nothing matches" through each cell -->
  <g stroke="#7a8696" stroke-width="0.8" opacity="0.5">
    <path d="M15 45l20 24M37 45l-20 24"/>
    <path d="M41 45l20 24M63 45l-20 24"/>
    <path d="M67 45l20 24M89 45l-20 24"/>
    <path d="M93 45l20 24M115 45l-20 24"/>
    <path d="M119 45l20 24M141 45l-20 24"/>
  </g>

  <!-- magnifier (brand-gradient stroke = accent) -->
  <g stroke="url(#brandGrad-02)" stroke-width="2.4" fill="none">
    <circle cx="80" cy="56" r="14"/>
    <line x1="90" y1="66" x2="100" y2="76"/>
  </g>
  <!-- inside lens — a dash to signal "no match" -->
  <path d="M73 56h14" stroke="#a8b2c1" stroke-width="1.8"/>
</svg>
