<?xml version="1.0" encoding="UTF-8"?>
<!--
  v0.10 AI DRAFT · Illustration 10 — art-tether-waiting (NEW)
  Camera with USB cable + tiny coffee mug nearby.
  Surface: tether session is live, no photos arrived yet.
  The mood is "set up, watching, ready" — not "broken / empty".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="brandGrad-10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6E56CF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <ellipse cx="80" cy="103" rx="50" ry="5" fill="rgba(99,102,241,0.10)"/>

  <!-- desk horizon line -->
  <line x1="18" y1="84" x2="142" y2="84"
        stroke="#7a8696" stroke-width="1" opacity="0.45"/>

  <!-- camera body -->
  <g stroke="#a8b2c1" stroke-width="2" fill="rgba(167,182,193,0.06)">
    <!-- prism hump -->
    <path d="M50 44h28l4 -10h12l4 10h12"/>
    <!-- main body -->
    <rect x="46" y="44" width="62" height="32" rx="4"/>
    <!-- shutter button (subtle) -->
    <circle cx="60" cy="42" r="2.4" stroke-width="1.6"/>
    <!-- mode dial -->
    <circle cx="98" cy="42" r="3.6" stroke-width="1.6"/>
  </g>

  <!-- lens (brand-gradient accent — eye contact moment) -->
  <g transform="translate(77, 60)">
    <circle cx="0" cy="0" r="13"
            stroke="url(#brandGrad-10)" stroke-width="2.4"
            fill="rgba(110,86,207,0.10)"/>
    <circle cx="0" cy="0" r="7"
            stroke="url(#brandGrad-10)" stroke-width="1.6" opacity="0.65"/>
    <circle cx="0" cy="0" r="2.4" fill="url(#brandGrad-10)"/>
    <!-- catchlight in the lens -->
    <circle cx="-3" cy="-3" r="1" fill="#fff" opacity="0.55"/>
  </g>

  <!-- USB cable trailing off to the right -->
  <path d="M108 70c8 4 14 0 20 -4s10 -8 14 -2"
        stroke="url(#brandGrad-10)" stroke-width="2"
        fill="none"/>
  <!-- connector tip -->
  <rect x="138" y="60" width="6" height="8" rx="1"
        stroke="url(#brandGrad-10)" stroke-width="1.6"
        fill="rgba(110,86,207,0.16)"/>

  <!-- pulsing "live" indicator above the cable join -->
  <circle cx="116" cy="58" r="2.4" fill="url(#brandGrad-10)"/>
  <circle cx="116" cy="58" r="5"   stroke="url(#brandGrad-10)" stroke-width="1" opacity="0.4"/>

  <!-- coffee mug, editorial detail — "photographer is waiting" -->
  <g transform="translate(28, 78)" stroke="#a8b2c1" stroke-width="1.6"
     fill="rgba(167,182,193,0.06)">
    <!-- mug body -->
    <path d="M-7 -8h14l-1 14a3 3 0 0 1 -3 3h-6a3 3 0 0 1 -3 -3z"/>
    <!-- handle -->
    <path d="M7 -3c4 0 6 2 6 4s-2 4-6 4"/>
    <!-- steam wisps -->
    <path d="M-3 -12c1 -2 -1 -3 0 -5M0 -12c1 -2 -1 -3 0 -5M3 -12c1 -2 -1 -3 0 -5"
          stroke="#a8b2c1" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- subtle "watching" sparkles -->
  <circle cx="40"  cy="32" r="1.2" fill="#6E56CF" opacity="0.5"/>
  <circle cx="124" cy="28" r="1.4" fill="#EC4899" opacity="0.45"/>
</svg>
