# Golden set expansion plan (V0.1 → V0.2)
# Target: ~500 labeled photos for regression testing across 4 active scenes.
# Each photo needs manual_label ∈ {keep, maybe, cull}; labels are the photographer's call.

target_total: 500

per_scene_budget:
  portrait:   150    # wedding, event headshot, studio, group
  wildlife:   100    # birds priority (~70) + mammals (~30)
  event:      150    # sports, stage, ceremony, street performance
  stilllife:  100    # product, food, interior

# Failure modes we want coverage for (each should have ≥5 examples):
coverage_axes:
  blur:
    - subject_in_focus_sharp
    - subject_motion_blur
    - camera_shake_global
    - severe_out_of_focus
    - mild_softness
  duplicate:
    - burst_near_identical
    - burst_distinct_moments
    - unrelated_same_scene
  subject:
    - clear_single_subject
    - no_clear_subject
    - multiple_subjects
    - subject_cropped_edge
  portrait_specific:
    - eyes_open_smile
    - eyes_closed
    - mid_blink
    - occluded_face
    - back_to_camera
  exposure:
    - properly_exposed
    - highlights_clipped
    - shadows_crushed
    - severe_under
    - severe_over

# Label workflow:
#   1. Photographer reviews a shoot in Lightroom / Capture One
#   2. Flags: P (pick) → keep, U (unflagged) → maybe, X (reject) → cull
#   3. Exports filenames + flags to CSV → append to ground_truth.csv
#   4. Copy referenced images into tests/fixtures/images/ (git-ignored; stored on NAS)
#
# Run: python scripts/eval_on_golden_set.py tests/fixtures/
#
# ORIGINAL V0.2 ship target: ≥70% exact, ≥90% within-one-class.
# REVISED target after V0.1 eval (see eval_findings.md):
#   V0.2 (current): ≥58% exact, ≥77% within-one-class  ← achieved: 57.8% / 77.3%
#   V0.5 (adds face/eye/composition/subject detectors): ≥70% exact, ≥88% within-one
#   V0.9 (adds moment/pose-peak): ≥78% exact, ≥93% within-one
# (keep↔maybe or maybe↔cull acceptable; keep↔cull is a hard failure.)
#
# Why V0.2 plateaued at baseline: ~60% of cull+maybe labels are subjective
# (审美一般, 普通人像, 没有突出主题) requiring composition+taste+subject detectors
# not present in V0.1. Parameter tuning alone cannot close this gap.
