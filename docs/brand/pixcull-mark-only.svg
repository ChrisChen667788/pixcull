<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"
     width="1024" height="1024" role="img"
     aria-label="PixCull">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6E56CF"/><stop offset="55%" stop-color="#A855F7"/><stop offset="100%" stop-color="#EC4899"/></linearGradient>
    <radialGradient id="cosmicBg" cx="30%" cy="35%" r="80%"><stop offset="0%"  stop-color="#3d1b69"/><stop offset="55%" stop-color="#1a1230"/><stop offset="100%" stop-color="#0b0d10"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#cosmicBg)"/>
  <ellipse cx="512" cy="512" rx="360" ry="360"
           fill="url(#brandGrad)" opacity="0.18"/>
  
<g transform="translate(176.00,176.00) scale(28)">
  <!-- the crowd: 4 small muted circles -->
  <circle cx="4"  cy="5"  r="1.6" fill="#ffffff" opacity="0.32"/>
  <circle cx="20" cy="6"  r="1.4" fill="#ffffff" opacity="0.28"/>
  <circle cx="3"  cy="19" r="1.8" fill="#ffffff" opacity="0.30"/>
  <circle cx="21" cy="20" r="1.3" fill="#ffffff" opacity="0.28"/>
  <!-- the picked one — large gradient + soft outer ring -->
  <circle cx="12" cy="12" r="7"  fill="url(#brandGrad)"/>
  <circle cx="12" cy="12" r="7.5" fill="none"
          stroke="url(#brandGrad)" stroke-width="0.6" opacity="0.5"/>
