<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"
     width="1280" height="720" role="img"
     aria-label="PixCull — LOCAL-FIRST AI PHOTO CULLING">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c4b9a9"/><stop offset="55%" stop-color="#988b78"/><stop offset="100%" stop-color="#6a6052"/></linearGradient>
    <radialGradient id="cosmicBg" cx="30%" cy="35%" r="80%"><stop offset="0%"  stop-color="#33291a"/><stop offset="55%" stop-color="#1e1a14"/><stop offset="100%" stop-color="#110e0b"/></radialGradient>
  </defs>
  <!-- Cosmic background -->
  <rect width="1280" height="720" fill="url(#cosmicBg)"/>
  <!-- Soft glow blob centred behind the logo to lift it off the bg -->
  <ellipse cx="320" cy="360" rx="280" ry="200"
           fill="url(#brandGrad)" opacity="0.18"/>
  <!-- Logo: ~280px wide, centred on the left third -->
  
<g transform="translate(182.00,222.00) scale(11.5)">
  <!-- the crowd: 4 small muted circles -->
  <circle cx="4"  cy="5"  r="1.6" fill="#ffffff" opacity="0.32"/>
  <circle cx="20" cy="6"  r="1.4" fill="#ffffff" opacity="0.28"/>
  <circle cx="3"  cy="19" r="1.8" fill="#ffffff" opacity="0.30"/>
  <circle cx="21" cy="20" r="1.3" fill="#ffffff" opacity="0.28"/>
  <!-- the picked one — large gradient + soft outer ring -->
  <circle cx="12" cy="12" r="7"  fill="url(#brandGrad)"/>
  <circle cx="12" cy="12" r="7.5" fill="none"
          stroke="url(#brandGrad)" stroke-width="0.6" opacity="0.5"/>
</g>
  <!-- Wordmark + subtitle + tagline column, right two-thirds -->
  <text x="600" y="330" font-family="'Charter','Iowan Old Style','PT Serif','Source Serif Pro','Cambria',Georgia,'Songti SC','STZhongsong',serif"
        font-size="120" font-weight="700" letter-spacing="-2"
        fill="#ffffff">
    Pix<tspan fill="url(#brandGrad)">Cull</tspan>
  </text>
  <text x="600" y="380" font-family="-apple-system,'Inter','Segoe UI Variable','Segoe UI','PingFang SC','Microsoft Yahei UI',system-ui,sans-serif"
        font-size="22" font-weight="600" letter-spacing="3"
        fill="#c4b9a9">
    LOCAL-FIRST AI PHOTO CULLING
  </text>
  <text x="600" y="440" font-family="-apple-system,'Inter','Segoe UI Variable','Segoe UI','PingFang SC','Microsoft Yahei UI',system-ui,sans-serif"
        font-size="24" font-weight="400" fill="#e8e0d4" opacity="0.92">
    本地 AI 帮你 6 秒挑出一晚要拍的全部精选。
  </text>
  <text x="600" y="640" font-family="-apple-system,'Inter','Segoe UI Variable','Segoe UI','PingFang SC','Microsoft Yahei UI',system-ui,sans-serif"
        font-size="14" font-weight="500" fill="#8a7d6a"
        letter-spacing="1.5">
    github.com/ChrisChen667788/pixcull
  </text>
</svg>
