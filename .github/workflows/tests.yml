name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI notes
# --------
# PixCull's dependency graph (torch + torchvision + onnxruntime +
# transformers + rembg + insightface + opencv + rawpy) is heavy and
# some imports auto-download model weights on first call. The CI
# pins matched CPU wheels for torch + torchvision to dodge the
# torchvision::nms registration mismatch you'd otherwise hit on a
# Linux runner.
#
# Two jobs:
#   import — pip install resolves + import sanity (fast, must pass)
#   pytest — runs the local test suite minus the fixtures-required
#            test_v1_1_scripts.py file (matches the local
#            `pytest --ignore=tests/test_v1_1_scripts.py` invocation
#            that gets 240/240 on the maintainer's Apple Silicon)

jobs:
  import:
    name: install + import smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU-pinned torch family + project)
        env:
          # Make PyTorch's CPU index the preferred source for any
          # torch-family package. Without this, pip resolves
          # torchvision to a CUDA wheel that doesn't match the CPU
          # torch we installed first — symptom is
          # "operator torchvision::nms does not exist" at import.
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
        run: |
          python -m pip install --upgrade pip
          # Pin a matched torch + torchvision CPU pair so the
          # editable-install step below doesn't upgrade one half of
          # the pair against the other.
          pip install --index-url https://download.pytorch.org/whl/cpu \
                      --extra-index-url https://pypi.org/simple \
                      "torch==2.4.1" "torchvision==0.19.1"
          pip install -e ".[dev]"

      - name: Resolved versions
        run: |
          python --version
          pip list | head -60

      - name: Import sanity
        run: |
          python -c "import pixcull; print('pixcull: ok')"
          python -c "from pixcull.scoring.rubric import RUBRIC_AXES; print(f'axes: {[a.name for a in RUBRIC_AXES]}')"
          python -c "from pixcull.scoring.photo_advice import build_advice; print('photo_advice: ok')"
          python -c "from pixcull.scoring.decision import decide; print('decision: ok')"
          python -c "import pixcull.tether; print('tether: ok')"
          python -c "import pixcull.sync; print('sync: ok')"

  pytest:
    name: pytest (hermetic subset)
    runs-on: ubuntu-latest
    needs: import
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        env:
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
                      --extra-index-url https://pypi.org/simple \
                      "torch==2.4.1" "torchvision==0.19.1"
          pip install -e ".[dev]"

      - name: Run hermetic tests
        run: |
          # Skip:
          #   - test_v1_1_scripts.py    fixtures not in public repo
          #   - test_v1_2_rescorer_integration.py joblib weights not in public repo
          # The remaining suite is hermetic (no model download
          # required for the assertions we check).
          pytest -q \
            --ignore=tests/test_v1_1_scripts.py \
            --ignore=tests/test_v1_2_rescorer_integration.py
