<?xml version="1.0" encoding="UTF-8"?>
<!--
  v0.10 AI DRAFT · Illustration 04 — art-empty-buckets
  Three nested editorial buckets, centre one with brand-gradient glow + "+".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="brandGrad-04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6E56CF"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <ellipse cx="80" cy="103" rx="50" ry="5" fill="rgba(99,102,241,0.10)"/>

  <!-- back buckets (muted, recede visually) -->
  <g stroke="#7a8696" stroke-width="1.4" opacity="0.55"
     fill="rgba(167,182,193,0.04)">
    <path d="M30 52h28l-3 36a3 3 0 0 1-3 3H36a3 3 0 0 1-3-3z"/>
    <line x1="30" y1="56" x2="58" y2="56"/>
  </g>
  <g stroke="#7a8696" stroke-width="1.4" opacity="0.55"
     fill="rgba(167,182,193,0.04)">
    <path d="M102 52h28l-3 36a3 3 0 0 1-3 3h-19a3 3 0 0 1-3-3z"/>
    <line x1="102" y1="56" x2="130" y2="56"/>
  </g>

  <!-- centre bucket (accent — the one the user would create) -->
  <path d="M64 44h32l-4 50a4 4 0 0 1-4 4H72a4 4 0 0 1-4-4z"
        stroke="url(#brandGrad-04)" stroke-width="2.4"
        fill="rgba(110,86,207,0.12)"/>
  <!-- bucket rim subtle highlight -->
  <line x1="64" y1="48" x2="96" y2="48"
        stroke="url(#brandGrad-04)" stroke-width="1.6" opacity="0.6"/>
  <!-- bucket handle hint (editorial detail) -->
  <path d="M70 44c0-4 4-7 10-7s10 3 10 7"
        stroke="url(#brandGrad-04)" stroke-width="1.6" opacity="0.7"/>

  <!-- floating "+" above the centre bucket -->
  <g transform="translate(80, 22)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="url(#brandGrad-04)" stroke-width="2.4"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="url(#brandGrad-04)" stroke-width="2.4"/>
  </g>
</svg>
